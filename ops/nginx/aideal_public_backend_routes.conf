# AIdeal public backend routes.
# Stable infra module. Do not overwrite during application-code changes.
# Public policy: WeChat/H5 user-facing links use no /api prefix.
#
# Production location:
#   /etc/nginx/snippets/aideal_public_backend_routes.conf
#
# Required include in aidealfy.cn vhost, before static /h5/ and / locations:
#   include /etc/nginx/snippets/aideal_public_backend_routes.conf;

location ^~ /users/ {
    proxy_pass http://127.0.0.1:8000/users/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location ^~ /promotion/ {
    proxy_pass http://127.0.0.1:8000/promotion/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location ^~ /h5/recommend/ {
    proxy_pass http://127.0.0.1:8000/h5/recommend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
}
